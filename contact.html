<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-orange-500 text-white p-4">
        <h1 class="text-3xl font-bold">
            FoodExpress
        </h1>
    </header>

    <!-- Navigation -->
    <nav class="bg-gray-800 text-white">
        <div class="flex justify-center gap-8 p-4">

            <a href="index.html">Home</a>
            <a href="restaurants.html">Restaurants</a>
            <a href="menu.html">Menu</a>
            <a href="order.html">Order</a>
            <a href="about.html">About</a>

            <a href="contact.html" class="text-orange-400 font-bold">
                Contact
            </a>

        </div>
    </nav>

    <!-- Contact Section -->
    <section class="max-w-md mx-auto bg-white p-6 mt-10 rounded shadow">

        <h2 class="text-3xl font-bold text-center mb-6">
            Contact Us
        </h2>

        <form>

            <label class="block mb-2">
                Name
            </label>

            <input
                type="text"
                class="w-full border p-2 mb-4 rounded"
                placeholder="Enter your name">

            <label class="block mb-2">
                Email
            </label>

            <input
                type="email"
                class="w-full border p-2 mb-4 rounded"
                placeholder="Enter your email">

            <label class="block mb-2">
                Message
            </label>

            <textarea
                rows="4"
                class="w-full border p-2 mb-4 rounded"
                placeholder="Enter your message"></textarea>

            <button
                type="submit"
                class="bg-orange-500 text-white px-4 py-2 rounded">

                Send Message

            </button>

        </form>

    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white text-center p-4 mt-10">
        <p>© 2026 FoodExpress. All Rights Reserved.</p>
    </footer>

</body>

</html>
